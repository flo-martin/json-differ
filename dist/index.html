<!DOCTYPE html><html lang="en"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>JSON Differ</title><link rel="stylesheet" href="/_astro/index.DDHPt2E1.css"></head> <body>  <div class="app" x-data="jsonDiffer"> <header> <h1>JSON Differ</h1> <p class="subtitle">Upload two JSON files to compare their structure</p> </header> <div class="panes"> <!-- Left pane --> <div class="pane"> <div class="pane-header"> <span class="pane-label">File A</span> <span class="pane-filename" x-show="leftFile" x-text="leftFile && leftFile.name"></span> </div> <div class="upload-zone" :class="{ dragging: leftDragging, loaded: leftFile, errored: leftError }" @dragover.prevent="leftDragging = true" @dragleave.prevent="leftDragging = false" @drop.prevent="handleDrop('left', $event)" @click="$refs.leftInput.click()"> <input type="file" accept=".json,application/json" x-ref="leftInput" @change="handleInput('left', $event)" style="display:none"> <div x-show="!leftFile && !leftError" class="upload-prompt"> <div class="upload-icon">↑</div> <p>Drop JSON file here</p> <p class="hint">or click to browse</p> </div> <div x-show="leftFile" class="file-loaded"> <div class="check">✓</div> <p class="loaded-name" x-text="leftFile && leftFile.name"></p> <p class="hint" x-text="leftFile && filePreview(leftFile)"></p> </div> <div x-show="leftError" class="file-error"> <div class="error-icon">✗</div> <p x-text="leftError"></p> </div> </div> </div> <!-- Right pane --> <div class="pane"> <div class="pane-header"> <span class="pane-label">File B</span> <span class="pane-filename" x-show="rightFile" x-text="rightFile && rightFile.name"></span> </div> <div class="upload-zone" :class="{ dragging: rightDragging, loaded: rightFile, errored: rightError }" @dragover.prevent="rightDragging = true" @dragleave.prevent="rightDragging = false" @drop.prevent="handleDrop('right', $event)" @click="$refs.rightInput.click()"> <input type="file" accept=".json,application/json" x-ref="rightInput" @change="handleInput('right', $event)" style="display:none"> <div x-show="!rightFile && !rightError" class="upload-prompt"> <div class="upload-icon">↑</div> <p>Drop JSON file here</p> <p class="hint">or click to browse</p> </div> <div x-show="rightFile" class="file-loaded"> <div class="check">✓</div> <p class="loaded-name" x-text="rightFile && rightFile.name"></p> <p class="hint" x-text="rightFile && filePreview(rightFile)"></p> </div> <div x-show="rightError" class="file-error"> <div class="error-icon">✗</div> <p x-text="rightError"></p> </div> </div> </div> </div> <!-- Waiting hint --> <div x-show="(leftFile || rightFile) && !(leftFile && rightFile)" class="waiting">
Load the second file to compare
</div> <!-- Diff output --> <div x-show="diffHtml" class="diff-section"> <div class="diff-header"> <h2>Structural Diff</h2> <div class="diff-controls"> <div class="filter-group"> <div class="filter-wrap filter-include"> <span class="filter-sign">+</span> <input type="text" class="filter-input" placeholder=".path.to.show" x-model="includeFilter" @input="applyAndRender()" spellcheck="false" autocomplete="off"> </div> <div class="filter-wrap filter-exclude"> <span class="filter-sign">−</span> <input type="text" class="filter-input" placeholder=".path.to.hide" x-model="excludeFilter" @input="applyAndRender()" spellcheck="false" autocomplete="off"> </div> </div> <label class="toggle"> <input type="checkbox" x-model="showUnchangedNodes" @change="toggleUnchanged()">
Show unchanged
</label> </div> </div> <div x-ref="diffOutput" x-html="diffHtml" class="diff-output"></div> </div> </div>  </body></html> <script type="module" src="/_astro/index.astro_astro_type_script_index_0_lang.C5SqWVwA.js"></script>
